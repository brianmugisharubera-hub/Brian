<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Eco-Stream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>User Login</h2>
        <form id="userLoginForm">
            <div class="form-group">
                <label for="userLoginUsername">Username:</label>
                <input type="text" id="userLoginUsername" name="userLoginUsername" required>
            </div>
            <div class="form-group">
                <label for="userLoginPassword">Password:</label>
                <input type="password" id="userLoginPassword" name="userLoginPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="userLoginMessage"></div>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
    <script src="user_login.js"></script>
</body>
</html>
