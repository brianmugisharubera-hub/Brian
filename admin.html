<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Eco-Stream</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #F5F9F4; margin: 0; font-family: 'Segoe UI', 'Open Sans', sans-serif; }
        .admin-header { background: linear-gradient(90deg, #2D5016 60%, #7FBA00 100%); color: #fff; padding: 1.2rem 0; text-align: center; }
        .admin-header h1 { margin: 0; font-size: 2rem; }
        .admin-container { max-width: 900px; margin: 2rem auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(45,80,22,0.10); padding: 2rem; }
        .admin-stats { display: flex; gap: 2rem; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-card { flex: 1 1 200px; background: #F0F7ED; border-radius: 8px; padding: 1.2rem; text-align: center; box-shadow: 0 2px 8px rgba(45,80,22,0.06); }
        .stat-card h2 { color: #2D5016; margin: 0 0 0.5rem 0; font-size: 1.2rem; }
        .stat-card .stat-value { font-size: 2rem; color: #7FBA00; font-weight: 700; }
        .admin-messages { margin-top: 2rem; }
        .admin-messages h2 { color: #2D5016; }
        .messages-list { list-style: none; padding: 0; }
        .messages-list li { background: #F0F7ED; border-radius: 7px; margin-bottom: 1rem; padding: 1rem; box-shadow: 0 2px 8px rgba(45,80,22,0.04); }
        .logout-btn { background: #2D5016; color: #fff; border: none; border-radius: 7px; padding: 0.7rem 1.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; float: right; margin-top: -3.5rem; margin-right: 1rem; }
        .logout-btn:hover { background: #7FBA00; color: #2D5016; }
        @media (max-width: 700px) { .admin-stats { flex-direction: column; gap: 1rem; } .logout-btn { float: none; display: block; margin: 1rem auto 0 auto; } }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>Admin Dashboard</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="admin-container">
        <div class="admin-stats">
            <div class="stat-card">
                <h2>Total Money Earned</h2>
                <div class="stat-value" id="moneyEarned">$0</div>
            </div>
            <div class="stat-card">
                <h2>EVs in Stock</h2>
                <div class="stat-value" id="evStock">0</div>
            </div>
            <div class="stat-card">
                <h2>Contact Requests</h2>
                <div class="stat-value" id="contactCount">0</div>
            </div>
        </div>
        <div class="admin-messages">
            <h2>Contact Messages</h2>
            <ul class="messages-list" id="messagesList"></ul>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
