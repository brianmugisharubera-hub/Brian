<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Eco-Stream</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        .admin-bg {
            min-height: 100vh;
            background: linear-gradient(120deg, #2D5016 0%, #7FBA00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(45,80,22,0.13);
            padding: 2.2rem 2rem 2rem 2rem;
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .admin-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .admin-header i {
            font-size: 2.2rem;
            color: #7FBA00;
        }
        .admin-header h2 {
            color: #2D5016;
            font-size: 2rem;
            margin: 0;
        }
        .admin-section {
            width: 100%;
            margin-bottom: 2rem;
        }
        .admin-section h3 {
            color: #2D5016;
            margin-bottom: 1rem;
        }
        .user-details-panel {
            background: #F5F5F5;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .submissions-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        .submissions-table th, .submissions-table td {
            border: 1px solid #CCC;
            padding: 0.5rem 0.7rem;
            text-align: left;
        }
        .submissions-table th {
            background: #e9f5e1;
            color: #2D5016;
        }
        .admin-logout-btn {
            background: linear-gradient(90deg, #2D5016 60%, #7FBA00 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 0.7rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            align-self: flex-end;
        }
        .admin-logout-btn:hover {
            background: linear-gradient(90deg, #7FBA00 0%, #2D5016 100%);
        }
        @media (max-width: 900px) {
            .admin-card { max-width: 99vw; padding: 1.2rem 0.5rem; }
        }
        @media (max-width: 600px) {
            .admin-header h2 { font-size: 1.3rem; }
            .admin-card { padding: 0.7rem 0.2rem; }
        }
    </style>
</head>
<body>
    <div class="admin-bg">
        <div class="admin-card">
            <div class="admin-header">
                <i class="fas fa-user-shield"></i>
                <h2>Admin Dashboard</h2>
            </div>
            <div class="admin-section">
                <div id="adminWelcome"></div>
            </div>
            <div class="admin-section">
                <h3>Contact & Email Submissions</h3>
                <div id="adminSubmissions"></div>
            </div>
            <button id="adminLogout" class="admin-logout-btn">Logout</button>
        </div>
    </div>
    <script src="admin_dashboard.js"></script>
</body>
</html>
